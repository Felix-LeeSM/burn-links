name: Planned task
description: Track implementation, documentation, operations, or maintenance work.
title: "[Task] "
labels:
  - review:needed
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What outcome should this issue produce?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is included in this issue?
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: List concrete checks that must be true before the issue closes.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: checkboxes
    id: affected-areas
    attributes:
      label: Affected Areas
      options:
        - label: web
        - label: api
        - label: worker
        - label: storage
        - label: contracts
        - label: deploy
        - label: docs
        - label: ci/github
        - label: security
  - type: textarea
    id: required-reading
    attributes:
      label: Required Reading
      description: Link local docs or GitHub context that must be read first.
      placeholder: |
        - AGENTS.md
        - docs/architecture/...
    validations:
      required: true
  - type: textarea
    id: test-plan
    attributes:
      label: Test Plan
      description: What checks should prove the issue is done?
      placeholder: |
        - scripts/ci/all.sh
    validations:
      required: true
  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of Scope
      description: What should this issue explicitly not change?
    validations:
      required: true
